name: 毎日オルカン価格をLINEに送信

on:
  schedule:
      - cron: '30 21 * * 0-4'
  workflow_dispatch:  # 手動でも実行できる

jobs:
  send-price:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4 yfinance
      - run: python emaxis_price.py
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
